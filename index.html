<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Материалы дела</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b111a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background-color: #000000;
            width: 100%;
            max-width: 380px;
            border-radius: 20px;
            padding: 20px 20px 30px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .video-player {
            position: relative;
            background: linear-gradient(135deg, #4a4a4a 0%, #1a1a1a 100%);
            border-radius: 12px;
            height: 200px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .play-btn {
            width: 56px;
            height: 56px;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.3);
        }

        .play-icon {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 10px 0 10px 16px;
            border-color: transparent transparent transparent white;
            margin-left: 4px;
        }

        .duration {
            position: absolute;
            right: 12px;
            bottom: 40px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 11px;
            font-weight: 500;
            padding: 3px 6px;
            border-radius: 4px;
        }

        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .small-play-btn {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 6px 0 6px 10px;
            border-color: transparent transparent transparent white;
            cursor: pointer;
        }

        .progress-slider {
            -webkit-appearance: none;
            flex-grow: 1;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
        }

        .progress-slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .title {
            color: white;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .description {
            color: #8e8e93;
            font-size: 13px;
            line-height: 1.4;
            margin-bottom: 24px;
        }

        .details-box {
            border: 1px solid #333333;
            border-radius: 10px;
            margin-bottom: 24px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid #333333;
            font-size: 13px;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #8e8e93;
        }

        .detail-value {
            color: white;
            font-weight: 600;
        }

        .value-green {
            color: #34c759;
        }

        .main-btn {
            display: block;
            background-color: #007aff;
            color: white;
            width: 100%;
            padding: 16px;
            text-decoration: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
        }

        .main-btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="video-player">
            <div class="play-btn" id="playBtn">
                <div class="play-icon"></div>
            </div>
            <div class="duration">0:48</div>
            <div class="controls">
                <div class="small-play-btn" id="smallPlayBtn"></div>
                <input type="range" class="progress-slider" id="progressSlider" min="0" max="100" value="0">
            </div>
        </div>

        <h1 class="title">Материалы дела</h1>
        <p class="description">Доступ к протоколу №4829-Б и видеозаписи системы ГЛОНАСС/GPS ограничен политикой безопасности.</p>

        <div class="details-box">
            <div class="detail-row">
                <span class="detail-label">Дата события:</span>
                <span class="detail-value">Сегодня</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Статус:</span>
                <span class="detail-value value-green">Проверено ГИБДД</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Формат:</span>
                <span class="detail-value">Full HD (MP4)</span>
            </div>
        </div>

        <a href="#" id="officialLink" class="main-btn">Открыть официальный плеер</a>
    </div>

    <script>
        const linkUrl = "https://google.com/";
        
        document.getElementById('officialLink').href = linkUrl;

        const playBtn = document.getElementById('playBtn');
        const smallPlayBtn = document.getElementById('smallPlayBtn');
        const slider = document.getElementById('progressSlider');

        const showPlayerAlert = () => {
            alert('Воспроизведение доступно только через официальный плеер! Установите его, нажав кнопку ниже.');
        };

        playBtn.addEventListener('click', showPlayerAlert);
        smallPlayBtn.addEventListener('click', showPlayerAlert);

        slider.addEventListener('input', function() {
            const value = this.value;
            this.style.background = `linear-gradient(to right, #ff0000 0%, #ff0000 ${value}%, rgba(255, 255, 255, 0.3) ${value}%, rgba(255, 255, 255, 0.3) 100%)`;
        });
    </script>
</body>
</html>
